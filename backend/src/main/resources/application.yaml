spring:
  application:
    name: llm-agent-backend
  # 持久化(WP1-T3):預設 in-memory;啟用 postgres profile 改用 PostgreSQL + Flyway。
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/llmagent}
    username: ${POSTGRES_USER:llmagent}
    password: ${POSTGRES_PASSWORD:llmagent}
  flyway:
    enabled: false
  ai:
    openai:
      # ICA OpenAI-Compatible Gateway。base-url 後接 /v1/chat/completions。
      base-url: ${ICA_API_URL}
      api-key: ${ICA_CLAUDE_KEY}
      chat:
        options:
          model: ${llmagent.chat.default-model-id}
          # ICA(litellm)對 Claude 僅接受 temperature=1;覆寫 Spring AI 預設 0.7 以免 400。
          temperature: 1.0
          # 提高輸出上限,避免完整程式碼/文件產出被預設 4096 截斷(ICA 對 claude-opus-4-8 可達 64000)。
          max-tokens: 32000
      # 平台僅用 chat;避免 embedding 自動設定要求額外參數。
      embedding:
        enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      # 預設(in-memory 模式)不檢查 DB;postgres profile 開啟。
      enabled: false

# Provider 設定(ADR-001)。apiKey 一律以環境變數參照,禁止明碼(CLAUDE.md #8)。
# ICA 為 OpenAI-Compatible Gateway;預設模型使用 ICA 最新 Claude。
llmagent:
  cors:
    allowed-origins: "http://localhost:5173"
  chat:
    # ICA 可用 Claude 中最新旗艦。
    default-model-id: claude-opus-4-8
    # SDLC Agent system prompt。強化 BDD/DDD/SOLID 產出準確度(可調)。
    default-system-prompt: |-
      你是一位資深軟體工程 Agent,專精 BDD、DDD 與 SOLID,精通 Java 21 與 Cucumber。

      【最重要 — 範圍限制】只輸出使用者「當前這則訊息」明確要求的產物,不要主動附加未被要求的內容:
      - 要求轉換/撰寫 Gherkin → 只輸出 Gherkin(.feature),不得附帶任何 Java 程式碼、測試或建置檔(pom/gradle)。
      - 要求撰寫文件 → 只輸出文件(結構化 Markdown)。
      - 要求開發程式碼 → 才輸出程式碼。
      多個步驟請分次進行,勿在前一步驟就預先產生後續步驟的產物。

      【格式規範】(僅在你確實要產生該類產物時適用)
      1. Gherkin:使用繁體中文關鍵字(功能:、場景:、場景大綱:、假設、當、那麼、而且、但是),
         同時涵蓋正向(happy path)與反向(密碼錯誤、餘額不足等)情境;以 ```gherkin 區塊呈現,
         第一行以註解標明 # language: zh-TW 與檔名。
      2. 程式碼:每個檔案獨立一個 code fence,首行以註解標明相對路徑
         (例如 // src/main/java/com/example/atm/domain/Account.java);遵循 DDD 分層(domain / application / infrastructure)
         與 SOLID;提供對應的 Cucumber step definitions、JUnit 5 test runner 與必要單元測試,測試涵蓋率 ≥ 80%。
      2a. Cucumber step definitions 使用「英文」annotation(@Given / @When / @Then / @And,匯入 io.cucumber.java.en.*),
          不要使用本地化中文 annotation;feature 檔保留繁體中文關鍵字(Cucumber 以步驟文字比對,兩者相容)。
      3. 文件:結構化 Markdown(標題階層、表格、清單),內容完整、可直接轉為 Word。
      4. 回答精確、聚焦;使用 Java 21 語法;實作完整,不用「...」省略。
  providers:
    ica:
      type: OPENAI_COMPATIBLE
      base-url: ${ICA_API_URL}/v1
      api-key: ${ICA_CLAUDE_KEY}
      default-model: claude-opus-4-8
