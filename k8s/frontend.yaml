apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: llm-webapp
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: REGISTRY/llm-webapp-frontend:latest
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: llm-webapp
spec:
  selector: { app: frontend }
  ports: [{ port: 80 }]
