apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: llm-webapp
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: llmagent }
            - { name: POSTGRES_DB, value: llmagent }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: llm-webapp-secrets, key: POSTGRES_PASSWORD } }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "llmagent"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - { name: pgdata, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: pgdata }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llm-webapp
spec:
  selector: { app: postgres }
  ports: [{ port: 5432 }]
